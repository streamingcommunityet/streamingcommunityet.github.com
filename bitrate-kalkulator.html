<section class="hero">
    <h1>Bitrate Kalkulator</h1>
    <p>Find den bedste bitrate til din upload-hastighed.</p>


<input type="number" id="upload" placeholder="Upload hastighed (Mbps)" style="padding:10px; margin-top:20px; width:250px;">

<br>

<button class="btn" onclick="calcBitrate()">Beregn</button>

<h2 id="result" style="margin-top:30px;"></h2>


</section>

<script>
function calcBitrate(){
    const upload = document.getElementById("upload").value;

    if(!upload){
        document.getElementById("result").innerText = "Indtast din upload hastighed";
        return;
    }

    // ca. 70% af upload til streaming
    const bitrate = Math.floor(upload * 1000 * 0.7);

    document.getElementById("result").innerText =
        "Anbefalet bitrate: " + bitrate + " kbps";
}
</script>
