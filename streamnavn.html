<section class="hero">
    <h1>Streamnavn Generator</h1>
    <p>Find et fedt navn til din stream med ét klik.</p>


<button class="btn" onclick="generateName()">Generér navn</button>

<h2 id="name" style="margin-top:30px;"></h2>


</section>

<script>
const names = [
    "ShadowStream",
    "PixelKing",
    "NightNova",
    "FrostByte",
    "StreamLegend",
    "AlphaCaster",
    "NovaPlays",
    "ZeroLagTV",
    "EchoGaming",
    "CyberWolf"
];

function generateName(){
    const random = names[Math.floor(Math.random() * names.length)];
    document.getElementById("name").innerText = random;
}
</script>
